<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>How this repo is put together</title>
<!--
  Render source for assets/overview-map-light.png / -dark.png.
  Regenerate with: ./assets/render.sh   Theme via ?theme=light (default) or ?theme=dark.

  RULE: this map carries NO figures. No scores, no file counts, no version numbers.
  It changes only when the architecture changes, which is rare, so it cannot drift
  the way a picture with numbers in it does.
-->
<style>
  :root {
    --paper: #edece4; --card: #f5f3ec; --ink: #1b201c; --ink-soft: #545a52;
    --ink-faint: #8b9088; --line: #d5d2c7; --accent: #216b57; --accent-tint: #dde9e2;
    --lost: #9a7a33;
    --mono: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  :root[data-theme="dark"] {
    --paper: #14171a; --card: #1a1e21; --ink: #e8e9e3; --ink-soft: #9aa19a;
    --ink-faint: #6b726b; --line: #2a2f2c; --accent: #52b998; --accent-tint: #16332a;
    --lost: #c39a47;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); }
  body { padding: 18px; }
  .frame { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; }
  svg { width: 100%; height: auto; display: block; font-family: var(--mono); }
</style>
</head>
<body>

<div class="frame">
<svg viewBox="0 0 900 566" role="img" aria-label="A map of how this repository is put together, in four bands. Top band, the entry path: a blank model or a new person reads AGENTS.md, then START_HERE.md, then STATE.md, which is the only place that states the working status. Middle band, three columns. The rules: STANDARD.md, from which the templates are derived. The proof: the experiment folder with variants one, two and three, holding pre-registrations, results and raw runs, whose arms are frozen as evidence and must not be corrected. The shop window: README.md and the landing page, fed with images by the assets folder and its render script. Below the columns, one filled-in instance, the tidymark example, derived from the rules and copied in frozen form into the experiment as its substrate. The experiment supplies the numbers to the shop window. Bottom band, the self-reference: this repo applies the rules to itself, the same five files sit at its root as its memory rather than as an example, which loops back to the entry path.">
  <defs>
    <marker id="om-ar" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="var(--ink-soft)"/></marker>
    <marker id="om-arA" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="var(--accent)"/></marker>
    <marker id="om-arL" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="var(--lost)"/></marker>
  </defs>

  <!-- ===== BAND 1: entry ===== -->
  <rect x="40" y="28" width="820" height="94" rx="10" fill="none" stroke="var(--line)"/>
  <text x="58" y="50" font-size="10" font-weight="700" fill="var(--accent)" letter-spacing="1.6">ENTRY &#183; THE ONLY RULE THAT COMES FROM OUTSIDE</text>

  <g font-size="10.5" fill="var(--ink)">
    <rect x="60" y="70" width="176" height="28" rx="5" fill="var(--paper)" stroke="var(--line)"/>
    <text x="148" y="88" text-anchor="middle" font-size="9.5" fill="var(--ink-soft)">a blank model / a new person</text>

    <rect x="284" y="70" width="104" height="28" rx="5" fill="var(--card)" stroke="var(--ink-faint)"/>
    <text x="336" y="88" text-anchor="middle">AGENTS.md</text>

    <rect x="436" y="70" width="136" height="28" rx="5" fill="var(--card)" stroke="var(--ink-faint)"/>
    <text x="504" y="88" text-anchor="middle">START_HERE.md</text>

    <rect x="620" y="70" width="104" height="28" rx="5" fill="var(--accent-tint)" stroke="var(--accent)"/>
    <text x="672" y="88" text-anchor="middle">STATE.md</text>
  </g>
  <path d="M240,84 L280,84" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#om-ar)" fill="none"/>
  <path d="M392,84 L432,84" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#om-ar)" fill="none"/>
  <path d="M576,84 L616,84" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#om-ar)" fill="none"/>
  <text x="736" y="81" font-size="8.5" fill="var(--accent)">the only place that says</text>
  <text x="736" y="92" font-size="8.5" fill="var(--accent)">what the status is</text>

  <!-- ===== BAND 2: three columns ===== -->
  <!-- col 1: the rules -->
  <rect x="40" y="150" width="250" height="172" rx="10" fill="none" stroke="var(--line)"/>
  <text x="58" y="172" font-size="10" font-weight="700" fill="var(--accent)" letter-spacing="1.6">THE RULES</text>
  <rect x="60" y="188" width="150" height="28" rx="5" fill="var(--card)" stroke="var(--ink-faint)"/>
  <text x="135" y="206" text-anchor="middle" font-size="10.5" fill="var(--ink)">STANDARD.md</text>
  <text x="60" y="230" font-size="8.5" fill="var(--ink-soft)">what a readable repo must contain</text>
  <path d="M135,236 L135,254" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#om-ar)" fill="none"/>
  <rect x="60" y="260" width="150" height="28" rx="5" fill="var(--card)" stroke="var(--ink-faint)"/>
  <text x="135" y="278" text-anchor="middle" font-size="10.5" fill="var(--ink)">templates/</text>
  <text x="60" y="302" font-size="8.5" fill="var(--ink-soft)">the same rules, as empty forms</text>

  <!-- col 2: the proof -->
  <rect x="325" y="150" width="250" height="172" rx="10" fill="none" stroke="var(--line)"/>
  <text x="343" y="172" font-size="10" font-weight="700" fill="var(--accent)" letter-spacing="1.6">THE PROOF</text>
  <rect x="345" y="188" width="150" height="28" rx="5" fill="var(--card)" stroke="var(--ink-faint)"/>
  <text x="420" y="206" text-anchor="middle" font-size="10.5" fill="var(--ink)">experiment/</text>
  <g font-size="9" fill="var(--ink-soft)">
    <rect x="345" y="228" width="42" height="20" rx="4" fill="var(--paper)" stroke="var(--line)"/><text x="366" y="242" text-anchor="middle">v1</text>
    <rect x="393" y="228" width="42" height="20" rx="4" fill="var(--paper)" stroke="var(--line)"/><text x="414" y="242" text-anchor="middle">v2</text>
    <rect x="441" y="228" width="42" height="20" rx="4" fill="var(--paper)" stroke="var(--line)"/><text x="462" y="242" text-anchor="middle">v3</text>
  </g>
  <text x="345" y="266" font-size="8.5" fill="var(--ink-soft)">pre-registrations, results, raw runs</text>
  <text x="345" y="288" font-size="8.5" fill="var(--lost)">arms are frozen: they are the evidence</text>
  <text x="345" y="300" font-size="8.5" fill="var(--lost)">for the runs, so do not correct them</text>

  <!-- col 3: the shop window -->
  <rect x="610" y="150" width="250" height="172" rx="10" fill="none" stroke="var(--line)"/>
  <text x="628" y="172" font-size="10" font-weight="700" fill="var(--accent)" letter-spacing="1.6">THE SHOP WINDOW</text>
  <rect x="630" y="186" width="160" height="26" rx="5" fill="var(--card)" stroke="var(--ink-faint)"/>
  <text x="710" y="203" text-anchor="middle" font-size="10.5" fill="var(--ink)">README.md</text>
  <rect x="630" y="218" width="160" height="26" rx="5" fill="var(--card)" stroke="var(--ink-faint)"/>
  <text x="710" y="235" text-anchor="middle" font-size="10.5" fill="var(--ink)">docs/index.html</text>
  <rect x="630" y="262" width="160" height="26" rx="5" fill="var(--paper)" stroke="var(--line)"/>
  <text x="710" y="279" text-anchor="middle" font-size="10" fill="var(--ink-soft)">assets/ + render.sh</text>
  <path d="M710,258 L710,248" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#om-ar)" fill="none"/>
  <text x="800" y="270" font-size="8.5" fill="var(--ink-soft)">images:</text>
  <text x="800" y="281" font-size="8.5" fill="var(--ink-soft)">source</text>
  <text x="800" y="292" font-size="8.5" fill="var(--ink-soft)">to PNG</text>

  <!-- proof -> shop window -->
  <path d="M575,202 L606,202" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#om-arA)" fill="none"/>
  <text x="590" y="188" text-anchor="middle" font-size="8.5" fill="var(--accent)">the numbers</text>

  <!-- ===== BAND 3: the instance ===== -->
  <rect x="150" y="352" width="266" height="54" rx="8" fill="var(--card)" stroke="var(--ink-faint)"/>
  <text x="283" y="374" text-anchor="middle" font-size="10.5" fill="var(--ink)">example/tidymark</text>
  <text x="283" y="392" text-anchor="middle" font-size="8.5" fill="var(--ink-soft)">one small project, filled in to the rules</text>

  <path d="M214,286 C260,312 290,336 330,350" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#om-ar)" fill="none"/>
  <text x="238" y="330" font-size="8.5" fill="var(--ink-soft)">instance</text>

  <path d="M416,372 C470,372 440,330 440,314" stroke="var(--lost)" stroke-width="1.4" marker-end="url(#om-arL)" fill="none"/>
  <text x="470" y="352" font-size="8.5" fill="var(--lost)">copied in, then frozen,</text>
  <text x="470" y="363" font-size="8.5" fill="var(--lost)">as the test substrate</text>

  <!-- ===== BAND 4: self-reference ===== -->
  <rect x="40" y="432" width="820" height="70" rx="10" fill="none" stroke="var(--accent)" stroke-dasharray="5 4"/>
  <text x="58" y="454" font-size="10" font-weight="700" fill="var(--accent)" letter-spacing="1.6">SELF-REFERENCE</text>
  <text x="58" y="474" font-size="10" fill="var(--ink)">This repo applies the rules to itself: the same five files sit at its root, as its memory,</text>
  <text x="58" y="490" font-size="10" fill="var(--ink)">not as an example. Which is where a cold reader comes in, at the top of this map.</text>

  <path d="M40,467 L20,467 L20,80 L36,80" stroke="var(--accent)" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#om-arA)" fill="none"/>

  <!-- ===== footer notes ===== -->
  <text x="40" y="528" font-size="9" fill="var(--ink-faint)">No build step and no runtime: Markdown, one shell script, one small example program.</text>
  <text x="40" y="546" font-size="9" fill="var(--ink-faint)">The diagrams exist twice on purpose, as a render source in assets/ and inline in the landing page. Change both together.</text>
</svg>
</div>

<script>
  (function () {
    var t = new URLSearchParams(location.search).get("theme");
    if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
  })();
</script>
</body>
</html>
