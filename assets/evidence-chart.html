<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>What carries the effect</title>
<!--
  Render source for assets/evidence-chart-light.png / -dark.png.
  Regenerate with: ./assets/render.sh   Theme via ?theme=light (default) or ?theme=dark.
  The markup and the .ev-* rules are duplicated inside docs/index.html on purpose
  (no build step). Change both together, then re-render.
  The numbers must match experiment/v2/RESULTS-v2.md and experiment/v3/RESULTS-v3.md.
-->
<style>
  :root {
    --paper: #edece4; --card: #f5f3ec; --ink: #1b201c; --ink-soft: #545a52;
    --ink-faint: #8b9088; --line: #d5d2c7; --accent: #216b57; --lost: #9a7a33;
    --mono: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  :root[data-theme="dark"] {
    --paper: #14171a; --card: #1a1e21; --ink: #e8e9e3; --ink-soft: #9aa19a;
    --ink-faint: #6b726b; --line: #2a2f2c; --accent: #52b998; --lost: #c39a47;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); font-family: var(--sans); }
  body { padding: 18px; }

  .evidence {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 22px 24px 18px;
  }
  .ev-title {
    font-family: var(--mono); font-size: 1.05rem; font-weight: 600; letter-spacing: -.01em;
    margin-bottom: 4px;
  }
  .ev-sub { font-size: .92rem; color: var(--ink-soft); margin-bottom: 20px; }
  .ev-row {
    display: grid; grid-template-columns: 15.5rem 1fr auto; gap: 18px; align-items: center;
    padding: 11px 0; border-top: 1px solid var(--line);
  }
  .ev-lbl { font-size: .95rem; line-height: 1.25; }
  .ev-lbl b { font-weight: 650; }
  .ev-lbl span {
    display: block; font-family: var(--mono); font-size: .72rem; color: var(--ink-faint);
    margin-top: 3px;
  }
  .ev-dots { display: flex; gap: 7px; }
  .ev-dots i { width: 14px; height: 14px; border-radius: 50%; flex: none; display: block; }
  .ev-dots i.hit { background: var(--accent); }
  .ev-dots i.miss { border: 1.5px solid var(--lost); position: relative; }
  .ev-dots i.miss::after {
    content: ""; position: absolute; inset: 2.5px; border-radius: 50%; background: var(--lost); opacity: .28;
  }
  .ev-score {
    font-family: var(--mono); font-weight: 700; font-size: 1.05rem; font-variant-numeric: tabular-nums;
    color: var(--accent); white-space: nowrap;
  }
  .ev-score.zero { color: var(--lost); }
  .ev-foot {
    margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--line);
    font-size: .82rem; color: var(--ink-soft); line-height: 1.5;
  }
  .ev-foot b { color: var(--ink); font-weight: 650; }
</style>
</head>
<body>

<figure class="evidence">
  <div class="ev-title">What carries the effect</div>
  <div class="ev-sub">Correct next action on a cold start. Same code and the same three facts in every arm.
    Only the way the working state is recorded changes.</div>

  <div class="ev-row">
    <div class="ev-lbl"><b>Nothing written down</b><span>bare repo &middot; n=5</span></div>
    <div class="ev-dots"><i class="miss"></i><i class="miss"></i><i class="miss"></i><i class="miss"></i><i class="miss"></i></div>
    <div class="ev-score zero">0 / 5</div>
  </div>

  <div class="ev-row">
    <div class="ev-lbl"><b>One unstructured note</b><span>a plain NOTES.md &middot; n=3</span></div>
    <div class="ev-dots"><i class="hit"></i><i class="hit"></i><i class="hit"></i></div>
    <div class="ev-score">3 / 3</div>
  </div>

  <div class="ev-row">
    <div class="ev-lbl"><b>Four files, structured</b><span>the standard &middot; n=3</span></div>
    <div class="ev-dots"><i class="hit"></i><i class="hit"></i><i class="hit"></i></div>
    <div class="ev-score">3 / 3</div>
  </div>

  <div class="ev-foot">
    The jump is between <b>nothing written down</b> and <b>something written down</b>. Between a plain
    note and the structured files, this test measured no difference. It ran on a 120-line project with a
    30-line note, which is where structure has the least to win. Whether it pays off at real size, over
    months, with several authors, is untested.
  </div>
</figure>

<script>
  (function () {
    var t = new URLSearchParams(location.search).get("theme");
    if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
  })();
</script>
</body>
</html>
